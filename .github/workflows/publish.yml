# Build and publish Sabba to PyPI. Runs ONLY when started by hand from the Actions tab
# (workflow_dispatch), so tagging a release never auto-publishes. Set up PyPI trusted
# publishing (OIDC) for this repo first, then run this workflow to publish. No API token is
# stored in the repo.
name: publish

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # trusted publishing to PyPI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
